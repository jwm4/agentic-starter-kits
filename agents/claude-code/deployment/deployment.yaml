# Claude Code Deployment for OpenShift
#
# This file contains all resources needed to deploy Claude Code on OpenShift.
#
# Before applying this manifest, create the credentials secret:
#   oc create secret generic claude-credentials \
#     --from-literal=ANTHROPIC_API_KEY="sk-ant-api03-YOUR_KEY_HERE"

---
# ImageStream to hold the built image
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: claude-code
  labels:
    app: claude-code
spec:
  lookupPolicy:
    local: true

---
# BuildConfig to build from Containerfile
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: claude-code
  labels:
    app: claude-code
spec:
  source:
    type: Binary
  strategy:
    type: Docker
    dockerStrategy:
      dockerfilePath: Containerfile
  output:
    to:
      kind: ImageStreamTag
      name: claude-code:latest
  triggers: []

---
# ConfigMap for optional MCP configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-mcp-config
  labels:
    app: claude-code
data:
  config.json: |
    {
      "mcpServers": {}
    }

---
# ConfigMap for skills
# Skills are injected at deploy time
# Each skill needs a subdirectory with a SKILL.md file.
# Modify this ConfigMap to add your own skills.
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-skills
  labels:
    app: claude-code
data:
  SKILL.md: |
    # Code Review

    When reviewing code, analyze for:

    1. **Correctness** - Logic errors, edge cases, off-by-one errors
    2. **Security** - Input validation, injection risks, hardcoded secrets
    3. **Performance** - Unnecessary loops, N+1 queries, missing indexes
    4. **Readability** - Clear naming, appropriate comments, consistent style
    5. **Maintainability** - DRY violations, tight coupling, missing error handling

    Provide feedback as:
    - **Must Fix** - Bugs or security issues
    - **Should Fix** - Performance or maintainability concerns
    - **Consider** - Style suggestions or minor improvements

---
# ConfigMap for Claude Code settings
# Settings are injected at deploy time
# Modify this ConfigMap to override Claude Code settings.
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-settings
  labels:
    app: claude-code
data:
  settings.json: |
    {}

---
# PVC for workspace persistence (optional)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: claude-workspace
  labels:
    app: claude-code
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code
  labels:
    app: claude-code
spec:
  replicas: 1
  # Recreate strategy required for ReadWriteOnce PVC - prevents Multi-Attach errors
  # during rolling updates (old pod must release PVC before new pod can mount it)
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: claude-code
          image: claude-code:latest
          imagePullPolicy: Always
          command: ["entrypoint.sh"]
          args: ["sleep", "infinity"]  # Keep container running for exec access
          env:
            # HOME must be set for the entrypoint to create ~/.claude/
            - name: HOME
              value: "/home/claude-agent"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claude-credentials
                  key: ANTHROPIC_API_KEY
            # Uncomment for custom endpoint:
            # - name: ANTHROPIC_BASE_URL
            #   value: "https://your-endpoint/v1"
            # - name: CLAUDE_MODEL
            #   value: "your-model"
            - name: MCP_CONFIG_FILE
              value: "/etc/mcp/config.json"
            # WARNING: Setting SKIP_PERMISSIONS=true disables all Claude permission checks.
            # This bypasses file-system write confirmations. Only use in fully sandboxed
            # environments where the container has no access to sensitive host resources.
            - name: SKIP_PERMISSIONS
              value: "true"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: skills
              mountPath: /home/claude-agent/.claude/skills
              readOnly: true
            - name: mcp-config
              mountPath: /etc/mcp
              readOnly: true
            - name: claude-settings
              mountPath: /home/claude-agent/.claude/settings.json
              subPath: settings.json
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: claude-workspace
        - name: skills
          configMap:
            name: claude-skills
            optional: true
            items:
              - key: SKILL.md
                path: code-review/SKILL.md
        - name: mcp-config
          configMap:
            name: claude-mcp-config
            optional: true
        - name: claude-settings
          configMap:
            name: claude-settings
            optional: true
