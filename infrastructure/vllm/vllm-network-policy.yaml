apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-<MODEL_SHORT_NAME>-ingress
  namespace: <NAMESPACE>
spec:
  podSelector:
    matchLabels:
      app: <MODEL_SHORT_NAME>
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          network.openshift.io/policy-group: ingress
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: <NAMESPACE>
    ports:
    - port: 8000
      protocol: TCP
  policyTypes:
  - Ingress
